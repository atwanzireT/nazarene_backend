{% extends 'base.html' %}

{% block content %}
<div class="row mb-4">
    <!-- Total Users -->
    <div class="col-md-3">
        <div class="card text-white bg-primary">
            <div class="card-body">
                <h5 class="card-title">Total Users</h5>
                <h3 class="card-text">{{total_users}}</h3>
            </div>
        </div>
    </div>
    <!-- Total Projects -->
    <div class="col-md-3">
        <div class="card text-white bg-success">
            <div class="card-body">
                <h5 class="card-title">Total Projects</h5>
                <h3 class="card-text">{{total_projects}}</h3>
            </div>
        </div>
    </div>
    <!-- Total Activities -->
    <div class="col-md-3">
        <div class="card text-white bg-warning">
            <div class="card-body">
                <h5 class="card-title">Total Activities</h5>
                <h3 class="card-text">{{total_activities}}</h3>
            </div>
        </div>
    </div>
    <!-- Total Events -->
    <div class="col-md-3">
        <div class="card text-white bg-danger">
            <div class="card-body">
                <h5 class="card-title">Total Events</h5>
                <h3 class="card-text">{{total_events}}</h3>
            </div>
        </div>
    </div>
</div>

<!-- Keep your existing transactions and table -->
<div class="row">
    <!-- Your timeline and table go here as they are -->
</div>
{% endblock content %}
